      adk-agents/qa_agent/main.py, adk-agents/qa_agent/tools/api_runner.py, adk-agents/qa_agent/tools/e2e_runner.py, adk-agents/qa_agent/tools/repo_scanner.py,
      adk-agents/visual_verifier/agent.py, adk-agents/visual_verifier/verify.py, legal-workbench/ferramentas/legal-doc-assembler/batch_cli.py,
