files:
  ./:
    type: pattern
    actions: [read]
    params:
      patterns: ['(DISPOSITIVO|DECIS[ÃA]O|AC[ÓO]RD[ÃA]O)\s*[:\-]?\s*(.*?)(?=EMENTA|RELAT[ÓO]RIO|$)', '*.json', '*_baseline.png']
      links: [pattern]
      caller: [get_staging_files, cleanup_staging, batch, list_baselines, processar_staging]
  .json:
    type: literal
    actions: [read]
    params:
      caller: [save_results]
      path: [self.config.output_dir]
  .md:
    type: literal
    actions: [read]
    params:
      caller: [save_results]
      path: [self.config.output_dir]
  _baseline.png:
    type: literal
    actions: [read]
    params:
      caller: [verify_page, update_baseline]
      path: [BASELINES_DIR]
  _current.png:
    type: literal
    actions: [read]
    params:
      caller: [verify_page, update_baseline]
      path: [SCREENSHOTS_DIR]
  baseline_path:
    type: variable
    actions: [read, write]
    params:
      caller: [Image.open, baseline_path.parent.mkdir, baseline_path.write_bytes]
  BASELINES_DIR:
    type: variable
    actions: [write, read]
    params:
      caller: [BASELINES_DIR.mkdir, BASELINES_DIR.glob]
  cleaned_md_path:
    type: variable
    actions: [write]
    params:
      caller: [cleaned_md_path.write_text]
  current_path:
    type: variable
    actions: [read]
    params:
      caller: [Image.open, current_path.read_bytes]
  data/context.db:
    type: literal
    actions: [read]
    params:
      caller: [stats]
  debug_tjsp_response.html:
    type: literal
    actions: [write]
    params:
      caller: [open]
      alias: [f]
  ferramentas/stj-dados-abertos:
    type: literal
    actions: [read]
    params:
      path: [Path.parent.parent.parent.parent]
  file_path:
    type: variable
    actions: [delete]
    params:
      caller: [file_path.unlink]
  final_cleaned.md:
    type: literal
    actions: [read]
    params:
      caller: [_generate_outputs]
      path: [output_path]
  final_tagged.md:
    type: literal
    actions: [read]
    params:
      caller: [_generate_outputs]
      path: [output_path]
  image_path:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  input_path:
    type: literal
    actions: [read]
    params:
      caller: [Path(input_md), input_path.read_text]
  json_path:
    type: literal
    actions: [read]
    params:
      caller: [Path(json_path), Path, open, json.load]
  latest_report.md:
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), reports, latest_report.md]
  output_dir:
    type: variable
    actions: [read]
    params:
      caller: [os.makedirs, Path]
  OUTPUT_DIR:
    type: variable
    actions: [write]
    params:
      caller: [OUTPUT_DIR.mkdir]
  output_file:
    type: variable
    actions: [write]
    params:
      caller: [open]
      alias: [f]
  output_path:
    type: literal
    actions: [read, write, delete]
    params:
      caller: [Path(output_dir), output_path.mkdir, open, output_path.unlink, json.load, Path, output_path.parent.mkdir, doc.save]
  path:
    type: literal
    actions: [read]
    params:
      caller: [Path(image_path), path.read_bytes]
  pdf_path:
    type: variable
    actions: [read]
    params:
      caller: [custom_engine.extract, os.path.basename, Path, self.marker_engine.extract]
  raw_dir:
    type: variable
    actions: [write]
    params:
      caller: [raw_dir.mkdir]
  repo_path:
    type: variable
    actions: [read]
    params:
      caller: [os.path.exists, os.walk]
  report_path:
    type: variable
    actions: [read, write]
    params:
      caller: [os.path.dirname, open]
  SCREENSHOTS_DIR:
    type: variable
    actions: [write]
    params:
      caller: [SCREENSHOTS_DIR.mkdir]
  script_name:
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [output_dir, script_name]
  script_path:
    type: variable
    actions: [write, read]
    params:
      caller: [open, json.load]
      alias: [f]
  semantic_structure.json:
    type: literal
    actions: [read]
    params:
      caller: [_generate_outputs]
      path: [output_path]
  STAGING_DIR:
    type: variable
    actions: [read]
    params:
      caller: [STAGING_DIR.glob]
  stj-data/database:
    type: literal
    actions: [read]
    params:
      caller: [init, info]
      path: [EXTERNAL_DRIVE]
  stj-data/logs:
    type: literal
    actions: [read]
    params:
      caller: [init]
      path: [EXTERNAL_DRIVE]
  structure_path:
    type: variable
    actions: [write]
    params:
      caller: [open]
      alias: [f]
  tagged_md_path:
    type: variable
    actions: [write]
    params:
      caller: [tagged_md_path.write_text]
  template_path:
    type: literal
    actions: [read]
    params:
      caller: ['Path(''{...}.docx'')']

processes:
  gemini:
    type: shell
    actions: [exec]
    args: [[--version], [-m, self.config.model], [-m, self.config.model]]
    params:
      caller: [subprocess.run]
      shell: ["False", "False", "False"]
  python:
    type: shell
    actions: [exec]
    args: [[script_path], [script_path]]
    params:
      caller: [subprocess.run]
      shell: ["False", "False"]
      ref: sys.executable
