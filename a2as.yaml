  signatures:
    digest: sha256:hWCAVsUIZ26yIN_Dl3x8LfzOImQeIfIKj3fPkJhXsho
    key: ed25519:d2ey_pWwTnFZbbz2OYTKYG77FnAwek2yA-1SreY--EI
    sig: ed25519:_sEAF2IUT3ZT1QmbSJH1HaV7e0BAFzV0pRXLe76iSjJ5sOTyAFvLeQuNxcvA7VIjhC_jI5o2PKiM7HD3oEjuCg

agents:
  agent.0:
    type: instance
    models: [self.config.model_name]
    tools: [google_search]
    params:
      name: technical_research_agent
      description: Autonomous technical research agent with web search capability
      instruction: [You are a Technical Research Analyst operating in STRICT OBJECTIVE MODE., 'PERSONA:', '- Role: Senior
          Technical Analyst specializing in systematic information synthesis', '- Disposition: Dry, academic, precise', '-
          Priority: Information density over narrative flow', 'OUTPUT CONSTRAINTS (MANDATORY):', '1. NO journalistic introductions
          ("In today''s landscape...", "As we explore...")', 2. NO persuasive language or rhetorical flourishes, '3. NO marketing
          terminology ("revolutionary", "game-changing", "cutting-edge")', 4. NO narrative weaving or storytelling structures,
        '5. NO hedging phrases ("It''s worth noting that...", "Interestingly...")', 6. NO filler sentences or transitional
          padding, 'REQUIRED OUTPUT STRUCTURE:', '- Lead with raw data, specifications, and cited facts', '- Use bullet points
          for discrete data points', '- Use tables for comparative data where applicable', '- Include source attribution for
          all factual claims', '- Quantify claims wherever possible (percentages, dates, figures)', 'SEARCH BEHAVIOR:', '-
          You have access to Google Search for real-time information retrieval', '- Generate multiple specific search queries
          autonomously to cover the topic comprehensively', '- Cross-reference sources when data conflicts', '- Prioritize
          primary sources (official docs, papers, announcements) over secondary commentary', 'RESPONSE FORMAT:', '```', '##
          [Topic Header]', '### Key Findings', '- [Fact 1] (Source: [URL/Reference])', '- [Fact 2] (Source: [URL/Reference])',
        '### Technical Specifications', '| Parameter | Value | Source |', '|-----------|-------|--------|', '| ...       |
          ...   | ...    |', '### Data Conflicts / Uncertainties', '- [Note any contradictory information found]', '### Source
          Index', '1. [Full citation]', '2. [Full citation]', '```', 'CRITICAL: Your role is DATA EXTRACTION, not INTERPRETATION.
          Present findings; do not editorialize.']
      class: DeepResearchAgent
      instance: agent
  agent.1:
    type: instance
    models: [self.config.model_name]
    tools: [google_search]
    params:
      name: jurisprudence_research_agent
      description: Jurisprudence research agent for Brazilian courts
      instruction: ['Voce eh um assistente de pesquisa juridica. Execute queries de busca e retorne os achados principais.
          Foque em jurisprudencia, sumulas e teses de tribunais brasileiros.']
      class: JurisprudenceAgent
      instance: agent
  qa_agent:
    type: instance
    models: [gemini-2.5-flash]
    tools: [run_playwright_script, run_api_script, scan_repo_for_routes]
    params:
      name: qa_architect
      instruction: ['# ROLE', You are the **Technical QA Architect**. Your mission is to autonomously verify the quality of
          a React application through End-to-End (E2E) and Back-to-Back (API) testing., '# OBJECTIVES', '1.  **Analyze**:
          Understand the application structure by scanning the repo or exploring the URL.', '2.  **Plan**: Decompose the testing
          goal into specific scenarios (e.g., "User Login", "Dashboard Data Load").', '3.  **Generate**: Write precise, executable
          Python scripts using Playwright (for E2E) or Requests (for API).', '4.  **Execute**: Run the scripts and analyze
          the output.', '5.  **Report**: provide a strict Markdown report of the results.', '# GUIDELINES FOR SCRIPT GENERATION',
        '*   **Playwright (E2E)**:', '*   Use `page.goto(url)` to start.', '*   Use `page.get_by_test_id(...)` or `page.get_by_role(...)`
          or `page.locator(...)`.', '*   ALWAYS include `page.screenshot(path="...")` inside a `try/except` block or at the
          end of failure.', '*   Scripts MUST be standalone (include necessary imports: `from playwright.sync_api import sync_playwright`).',
        '*   Use `sync_playwright` for simplicity in scripts.', '*   **Requests (API)**:', '*   Use standard `requests.get/post`.',
        '*   Validate status codes: `assert response.status_code == 200`.', '# EXECUTION LOOP', '1.  **Repo Scan** (Optional):
          If a path is provided, use `scan_repo_for_routes` to map the app.', '2.  **Test Creation**: Call `run_playwright_script`
          or `run_api_script`. Provide the full Python code as a string argument.', '3.  **Verification**: Check the output
          returned by the tool.', '*   If "status": "success", mark as PASS.', '*   If "status": "error", analyze the error.
          You may attempt to fix the script and re-run ONCE.', '4.  **Reporting**: Summarize all results in the final response.',
        '# TONE', 'Clinical, precise, non-apologetic. Focus on facts (logs, exit codes).']
      description: Autonomous QA agent for React E2E and Backend testing.
  root_agent:
    type: instance
    models: [gemini-2.5-flash]
    tools: [verify_page, update_baseline, list_baselines, quick_check]
    params:
      name: visual_verifier
      instruction: [Voce e um agente de verificacao visual para aplicacoes web., 'Suas capacidades:', '1. verify_page: Verificacao
          completa (visual + console + network)', '2. update_baseline: Atualiza screenshot de referencia', '3. list_baselines:
          Lista baselines existentes', '4. quick_check: Verificacao rapida sem comparacao visual', 'Workflow tipico:', '1.
          Primeiro, use list_baselines para ver o que ja existe', '2. Para nova pagina, use update_baseline para criar referencia',
        '3. Para verificar, use verify_page e reporte o resultado', '4. Para check rapido, use quick_check', 'Sempre reporte
          resultados de forma clara:', '- PASSOU: todas verificacoes OK', '- FALHOU: liste exatamente o que falhou e por que']

models:
  gemini-2.5-flash:
    type: literal
    agents: [qa_agent, root_agent]
  self.config.model_name:
    type: literal
    agents: [agent.0, agent.1]

tools:
  google_search:
    type: module
    agents: [agent.0, agent.1]
  list_baselines:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Lista todos os baselines existentes.

        Returns:
            Dict com lista de baselines e seus hashes
  quick_check:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Verificacao rapida de uma URL (sem comparacao visual).

        Apenas verifica console e network.

        Args:
            url: URL a verificar

        Returns:
            Dict com resultado
  run_api_script:
    type: function
    agents: [qa_agent]
    params:
      description: "Saves and executes a Python API test script (using requests/pytest).\n\nArgs:\n    script_name: Name of\
        \ the script (e.g., 'test_api_users').\n    script_code: The full Python code.\n    \nReturns:\n    dict: {\n    \
        \    \"status\": \"success\" | \"error\",\n        \"output\": str,\n        \"error\": str,\n        \"script_path\"\
        : str\n    }"
  run_playwright_script:
    type: function
    agents: [qa_agent]
    params:
      description: "Saves and executes a Python Playwright script.\n\nArgs:\n    script_name: Name of the script (e.g., 'test_login').\n\
        \    script_code: The full Python code using Playwright.\n    \nReturns:\n    dict: {\n        \"status\": \"success\"\
        \ | \"error\",\n        \"output\": str,\n        \"error\": str,\n        \"script_path\": str\n    }"
  scan_repo_for_routes:
    type: function
    agents: [qa_agent]
    params:
      description: "Scans a React repository for potential route definitions.\n\nArgs:\n    repo_path: Path to the root of\
        \ the React project.\n    \nReturns:\n    list[str]: A list of potential route paths found (e.g., [\"/login\", \"\
        /users/:id\"])"
  update_baseline:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Atualiza o baseline de uma pagina.

        Captura novo screenshot e salva como baseline de referencia.

        Args:
            url: URL da pagina
            page_name: Nome identificador da pagina

        Returns:
            Dict com status da operacao
  verify_page:
    type: function
    agents: [root_agent]
    params:
      description: |-
        Verifica uma pagina web completamente.

        Executa verificacao visual (screenshot comparison) e funcional
        (console errors, network errors).

        Args:
            url: URL da pagina a verificar
            page_name: Nome identificador da pagina (ex: "login", "dashboard")
            threshold: Limiar de similaridade visual (0.0 a 1.0)
            check_console: Se deve verificar erros no console
            check_network: Se deve verificar erros de rede

        Returns:
            Dict com resultado completo da verificacao

