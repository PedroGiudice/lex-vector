      legal-workbench/ferramentas/legal-text-extractor/src/gemini/client.py, legal-workbench/ferramentas/legal-text-extractor/src/monitoring.py,
      legal-workbench/ferramentas/legal-text-extractor/src/steps/step_04_classify.py]
  issued:
    by: A2AS.org
    at: '2026-02-11T17:03:59Z'
