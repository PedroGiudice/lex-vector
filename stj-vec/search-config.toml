[server]
port = 8421
static_dir = "frontend/dist"
cors_origins = ["http://localhost:5173"]

[model]
dir = "models/bge-m3-onnx"
threads = 8

[qdrant]
url = "http://localhost:6334"
collection = "stj"
dense_top_k = 200
sparse_top_k = 200
rrf_k = 60

[sqlite]
path = "db/stj-vec.db"
pool_size = 4

[search]
max_results = 50
default_limit = 20
overfetch_factor = 5
dense_weight = 1.0
sparse_weight = 0.1

[preprocessing]
enabled = true
extract_metadata = true
remove_stopwords = true
expand_query = false
expansions_file = "config/expansao_juridica.json"
max_expansion_tokens = 200
